<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Promo Spesial - Klik Gambar</title>
    
    <!-- Meta tag untuk Facebook / Open Graph -->
    <meta property="og:title" content="+18">
    <meta property="og:description" content="adult  +18 only">
    <meta property="og:image" content="https://i.imgur.com/cxuNQ5G.jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://username.github.io/angel/">  <!-- GANTI DENGAN URL ASLI -->
    <meta property="og:type" content="website">
    
    <!-- fb:app_id opsional, bisa diisi angka dummy untuk hilangkan peringatan -->
    <meta property="fb:app_id" content="123456789012345">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="">
    <meta name="twitter:image" content="https://i.imgur.com/cxuNQ5G.jpeg">
    
    <style>
        body {
            margin: 0;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .clickable-image {
            display: block;
            cursor: pointer;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .clickable-image:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }
        img {
            width: 100%;
            height: auto;
            display: block;
        }
        .caption {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #4b5563;
            background: rgba(255,255,255,0.8);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- GANTI href dengan link tujuan Anda -->
        <a href="https://omg10.com/4/10987615" target="_blank" rel="noopener noreferrer" class="clickable-image">
            <img src="https://i.imgur.com/cxuNQ5G.jpeg" alt="Klik untuk promo">
        </a>
        <div class="caption">
            🖱️ Klik gambar
        </div>
    </div>
</body>
</html>

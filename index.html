<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta property="fb:app_id" content="123456789012345">
    <title>Klik Gambar - Promo</title>
    
    <!-- Meta tag untuk Facebook / WhatsApp / Twitter -->
    <meta property="og:title" content="Promo Spesial! Klik Gambar" />
    <meta property="og:description" content="Dapatkan penawaran menarik. Klik gambar untuk info lengkap." />
    <meta property="og:image" content="https://i.imgur.com/cxuNQ5G.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://username.github.io/nama-repo/" /> <!-- GANTI dengan URL halaman Anda -->
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #eef2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .card {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .clickable-image {
            display: block;
            cursor: pointer;
            overflow: hidden;
        }
        .clickable-image img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }
        .clickable-image:hover img {
            transform: scale(1.03);
        }
        .caption {
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eef2f5;
        }
        .caption h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #1f2937;
        }
        .caption p {
            color: #4b5563;
            margin-bottom: 12px;
        }
        .badge {
            background: #e0e7ff;
            color: #4338ca;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        @media (max-width: 500px) {
            .caption h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- GANTI href dengan link tujuan Anda -->
        <a href="https://omg10.com/4/10987615" target="_blank" rel="noopener noreferrer" class="clickable-image">
            <img src="https://i.imgur.com/cxuNQ5G.jpeg" alt="Klik untuk promo">
        </a>
        <div class="caption">
            <h2>✨ Klik Gambar di Atas ✨</h2>
            <p>adult +18 only</p>
            <div class="badge"></div>
        </div>
    </div>
</body>
</html>
